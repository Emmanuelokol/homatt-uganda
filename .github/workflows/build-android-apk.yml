name: Build Android APK

on:
  push:
    branches: [ main, 'claude/**' ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create app config.js with Supabase + OneSignal credentials
        run: |
          {
            echo "window.HOMATT_CONFIG = {"
            echo "  SUPABASE_URL: 'https://kgkdiykzmqjougwzzewi.supabase.co',"
            echo "  SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtna2RpeWt6bXFqb3Vnd3p6ZXdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyMzI1MTEsImV4cCI6MjA4NjgwODUxMX0.BhrLUC57jA-xsoFiTKqk_qKVsHsb71YGSEnvjzyQ0e8',"
            echo "  API_PROXY_URL: 'https://kgkdiykzmqjougwzzewi.supabase.co/functions/v1/ai-proxy',"
            echo "  ONESIGNAL_APP_ID: '${{ secrets.ONESIGNAL_APP_ID }}',"
            echo "};"
          } > app/js/config.js

      - name: Write google-services.json (required for FCM / push notifications)
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 --decode > android/app/google-services.json
            echo "✓ google-services.json written"
          else
            echo "::warning::GOOGLE_SERVICES_JSON secret is not set — push notifications will NOT work in this build."
            echo "::warning::Get google-services.json from Firebase Console → Project Settings → Your Android app"
            echo "::warning::Then base64-encode it and add as GOOGLE_SERVICES_JSON secret in GitHub."
          fi

      - name: Install npm dependencies
        run: npm install

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Sync Capacitor — copy web assets + install native plugins
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"

      - name: Locate built APK
        run: find android/app/build/outputs -name "*.apk" -type f

      - name: Upload APK — Homatt Health Android
        uses: actions/upload-artifact@v4
        with:
          name: Homatt-Health-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 90
