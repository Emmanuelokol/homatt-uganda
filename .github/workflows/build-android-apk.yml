name: Build Android APK

on:
  push:
    branches: [ main, claude/* ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug or release)'
        required: false
        default: 'debug'

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm install

      - name: Create app config.js (inject Supabase keys)
        run: |
          {
            echo "window.HOMATT_CONFIG = {"
            echo "  SUPABASE_URL: '${{ secrets.SUPABASE_URL }}',"
            echo "  SUPABASE_ANON_KEY: '${{ secrets.SUPABASE_ANON_KEY }}',"
            echo "};"
          } > app/js/config.js

      - name: Initialize Capacitor Android project
        run: |
          npx cap add android || echo "Android platform may already exist"
          npx cap sync android

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        if: github.event.inputs.build_type != 'release'
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release APK (unsigned)
        if: github.event.inputs.build_type == 'release'
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Find APK file
        run: find android -name "*.apk" -type f 2>/dev/null

      - name: Upload Debug APK as artifact
        if: github.event.inputs.build_type != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: homatt-health-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Release APK as artifact
        if: github.event.inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: homatt-health-release-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Comment APK download link on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Android APK built successfully!**\n\nDownload from the [Actions tab](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) → Artifacts section.\n\nInstall on Android: enable "Install from Unknown Sources" in Settings → Security.'
            })
