name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API keys into config.js
        run: |
          cat > app/js/config.js << 'ENDOFFILE'
          window.HOMATT_CONFIG = {
            GROQ_API_KEY: 'GROQ_PLACEHOLDER',
            DEEPSEEK_API_KEY: 'DEEPSEEK_PLACEHOLDER',
            OPENAI_API_KEY: 'OPENAI_PLACEHOLDER',
            GEMINI_API_KEY: 'GEMINI_PLACEHOLDER',
          };
          ENDOFFILE
          sed -i "s|GROQ_PLACEHOLDER|${GROQ_API_KEY}|g" app/js/config.js
          sed -i "s|DEEPSEEK_PLACEHOLDER|${DEEPSEEK_API_KEY}|g" app/js/config.js
          sed -i "s|OPENAI_PLACEHOLDER|${OPENAI_API_KEY}|g" app/js/config.js
          sed -i "s|GEMINI_PLACEHOLDER|${GEMINI_API_KEY}|g" app/js/config.js
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './app'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
