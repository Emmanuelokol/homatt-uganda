name: Deploy App to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Generates config.js at deploy time — keeps secrets out of the repo.
      # ONESIGNAL_APP_ID goes here so the frontend SDK can initialise.
      - name: Write config.js
        run: |
          cat > app/js/config.js <<EOF
          window.HOMATT_CONFIG = {
            API_PROXY_URL:     'https://kgkdiykzmqjougwzzewi.supabase.co/functions/v1/ai-proxy',
            ONESIGNAL_APP_ID:  '${{ secrets.ONESIGNAL_APP_ID }}',
          };
          EOF

      - name: Deploy app/ to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./app
          publish_branch: gh-pages
          force_orphan: false
