name: Deploy to GitHub Pages

on:
  push:
    branches:
      - 'claude/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API keys into config.js
        run: |
          cat > app/js/config.js << 'ENDOFFILE'
          window.HOMATT_CONFIG = {
            GROQ_API_KEY: 'GROQ_PLACEHOLDER',
            DEEPSEEK_API_KEY: 'DEEPSEEK_PLACEHOLDER',
            OPENAI_API_KEY: 'OPENAI_PLACEHOLDER',
            GEMINI_API_KEY: 'GEMINI_PLACEHOLDER',
          };
          ENDOFFILE
          sed -i "s|GROQ_PLACEHOLDER|${GROQ_API_KEY}|g" app/js/config.js
          sed -i "s|DEEPSEEK_PLACEHOLDER|${DEEPSEEK_API_KEY}|g" app/js/config.js
          sed -i "s|OPENAI_PLACEHOLDER|${OPENAI_API_KEY}|g" app/js/config.js
          sed -i "s|GEMINI_PLACEHOLDER|${GEMINI_API_KEY}|g" app/js/config.js
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Push app to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cd app
          git init
          git checkout -b gh-pages
          git add -A
          git commit -m "Deploy to GitHub Pages"
          git push -f \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            gh-pages

      - name: Set Pages source to gh-pages branch
        run: |
          gh api "repos/${{ github.repository }}/pages" \
            --method PUT \
            --field "source[branch]=gh-pages" \
            --field "source[path]=/" \
            && echo "Pages source set to gh-pages branch" \
            || echo "Note: Pages source update failed - go to Settings -> Pages and set source to gh-pages branch manually"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
