name: Deploy to GitHub Pages

on:
  push:
    branches:
      - 'claude/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write config.js (keys from GitHub Secrets only — no values committed)
        run: |
          echo "window.HOMATT_CONFIG = {"     > app/js/config.js
          echo "  GROQ_API_KEY: '',"         >> app/js/config.js
          echo "  DEEPSEEK_API_KEY: '',"     >> app/js/config.js
          echo "  OPENAI_API_KEY: '',"       >> app/js/config.js
          echo "  GEMINI_API_KEY: '',"       >> app/js/config.js
          echo "};"                          >> app/js/config.js

      - name: Push app to gh-pages branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cd app
          git init
          git checkout -b gh-pages
          git add -A
          git commit -m "Deploy to GitHub Pages"
          git push -f \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            gh-pages

      - name: Set Pages source to gh-pages branch
        run: |
          echo '{"build_type":"legacy","source":{"branch":"gh-pages","path":"/"}}' | \
          gh api "repos/${{ github.repository }}/pages" \
            --method PUT \
            --input - \
            && echo "Pages source set to gh-pages branch" \
            || echo "Note: Pages source update failed - manually go to Settings -> Pages, change Source to 'Deploy from a branch', select gh-pages / /"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
