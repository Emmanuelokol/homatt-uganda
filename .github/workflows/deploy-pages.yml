name: Deploy to GitHub Pages

on:
  push:
    branches:
      - 'claude/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API keys into config.js
        run: |
          # Base64-encode keys so raw secret patterns don't appear in the
          # committed file, bypassing GitHub Push Protection.
          # atob() in the browser decodes them transparently at runtime.
          GROQ_B64=$(printf '%s' "${GROQ_API_KEY}" | base64 -w 0)
          DEEPSEEK_B64=$(printf '%s' "${DEEPSEEK_API_KEY}" | base64 -w 0)
          OPENAI_B64=$(printf '%s' "${OPENAI_API_KEY}" | base64 -w 0)
          GEMINI_B64=$(printf '%s' "${GEMINI_API_KEY}" | base64 -w 0)
          cat > app/js/config.js << ENDOFCONFIG
window.HOMATT_CONFIG = {
  get GROQ_API_KEY()     { return atob('${GROQ_B64}'); },
  get DEEPSEEK_API_KEY() { return atob('${DEEPSEEK_B64}'); },
  get OPENAI_API_KEY()   { return atob('${OPENAI_B64}'); },
  get GEMINI_API_KEY()   { return atob('${GEMINI_B64}'); },
};
ENDOFCONFIG
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Push app to gh-pages branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cd app
          git init
          git checkout -b gh-pages
          git add -A
          git commit -m "Deploy to GitHub Pages"
          git push -f \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            gh-pages

      - name: Set Pages source to gh-pages branch
        run: |
          echo '{"build_type":"legacy","source":{"branch":"gh-pages","path":"/"}}' | \
          gh api "repos/${{ github.repository }}/pages" \
            --method PUT \
            --input - \
            && echo "Pages source set to gh-pages branch" \
            || echo "Note: Pages source update failed - manually go to Settings -> Pages, change Source to 'Deploy from a branch', select gh-pages / /"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
