name: Deploy Edge Functions (branch)

# Deploys edge functions on every push to claude/* branches.
on:
  push:
    branches:
      - 'claude/**'
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:              # Allow manual trigger from GitHub Actions UI

env:
  SUPABASE_PROJECT_REF: kgkdiykzmqjougwzzewi

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check SUPABASE_ACCESS_TOKEN is set
        run: |
          if [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set."
            echo "::error::Go to: Supabase dashboard → Account → Access Tokens → create one"
            echo "::error::Then: GitHub repo → Settings → Secrets → Actions → New secret"
            exit 1
          fi
          echo "✓ SUPABASE_ACCESS_TOKEN is set"

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # Only set the secrets that send-notification actually needs.
      # Skips AI keys (GROQ/OPENAI/GEMINI) to avoid failing on unset secrets.
      - name: Set push notification secrets
        run: |
          ARGS=""
          if [ -n "${{ secrets.ONESIGNAL_APP_ID }}" ]; then
            ARGS="$ARGS ONESIGNAL_APP_ID=${{ secrets.ONESIGNAL_APP_ID }}"
          fi
          if [ -n "${{ secrets.ONESIGNAL_REST_API_KEY }}" ]; then
            ARGS="$ARGS ONESIGNAL_REST_API_KEY=${{ secrets.ONESIGNAL_REST_API_KEY }}"
          fi
          if [ -n "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" ]; then
            ARGS="$ARGS SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
          fi
          if [ -n "$ARGS" ]; then
            supabase secrets set $ARGS --project-ref $SUPABASE_PROJECT_REF
            echo "✓ Secrets updated"
          else
            echo "::warning::No push-notification secrets found — skipping secrets set step"
            echo "::warning::Add ONESIGNAL_APP_ID, ONESIGNAL_REST_API_KEY, SUPABASE_SERVICE_ROLE_KEY to GitHub Secrets"
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        continue-on-error: true   # Don't block deploy if secrets step has issues

      - name: Deploy send-notification
        run: |
          supabase functions deploy send-notification \
            --project-ref $SUPABASE_PROJECT_REF \
            --no-verify-jwt
          echo "✓ send-notification deployed"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy ai-proxy
        run: |
          supabase functions deploy ai-proxy \
            --project-ref $SUPABASE_PROJECT_REF \
            --no-verify-jwt
          echo "✓ ai-proxy deployed"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        continue-on-error: true   # Non-critical for push notifications

      - name: Deploy relworx-payment
        run: |
          supabase functions deploy relworx-payment \
            --project-ref $SUPABASE_PROJECT_REF \
            --no-verify-jwt
          echo "✓ relworx-payment deployed"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        continue-on-error: true   # Non-critical for push notifications
