name: Deploy Edge Functions & Run Migration

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'supabase/functions/**'
      - 'supabase/migrations/**'
  workflow_dispatch:              # allow manual re-run from the Actions tab

# Don't let two runs try to push functions / migrations at the same time.
concurrency:
  group: deploy-edge-function
  cancel-in-progress: false       # let the in-flight migration finish

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # ── Set all Supabase function secrets ───────────────────────────────
      # These are stored as GitHub Secrets — never committed to the repo.
      # ONESIGNAL_APP_ID, ONESIGNAL_REST_API_KEY, SUPABASE_SERVICE_ROLE_KEY
      # are already added to Supabase by the project owner.
      # We re-apply them here so they stay in sync on every deploy.
      - name: Set Supabase secrets
        run: |
          supabase secrets set \
            GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
            OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            ONESIGNAL_APP_ID="${{ secrets.ONESIGNAL_APP_ID }}" \
            ONESIGNAL_REST_API_KEY="${{ secrets.ONESIGNAL_REST_API_KEY }}" \
            SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            --project-ref kgkdiykzmqjougwzzewi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # ── Deploy ai-proxy Edge Function ────────────────────────────────────
      - name: Deploy ai-proxy function
        run: |
          supabase functions deploy ai-proxy \
            --project-ref kgkdiykzmqjougwzzewi \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # ── Deploy notify Edge Function ───────────────────────────────────────
      - name: Deploy notify function
        run: |
          supabase functions deploy notify \
            --project-ref kgkdiykzmqjougwzzewi \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # ── Run SQL Migrations ────────────────────────────────────────────────
      # supabase db push applies any new migration files to the remote project.
      - name: Run database migrations
        run: |
          supabase db push \
            --project-ref kgkdiykzmqjougwzzewi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
