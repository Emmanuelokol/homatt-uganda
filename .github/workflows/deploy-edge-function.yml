name: Deploy Edge Functions to Supabase

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'   # Only runs when an Edge Function changes
  workflow_dispatch:              # Allow manual trigger from GitHub Actions UI

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # ── Set ALL required secrets on Supabase ──────────────────────────────
      # NOTE: ONESIGNAL_APP_ID and ONESIGNAL_REST_API_KEY must be added as
      # GitHub Secrets (repo → Settings → Secrets → Actions) for push
      # notifications to work. The send-notification Edge Function reads them.
      - name: Set Supabase secrets
        run: |
          supabase secrets set \
            GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
            OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            ONESIGNAL_APP_ID="${{ secrets.ONESIGNAL_APP_ID }}" \
            ONESIGNAL_REST_API_KEY="${{ secrets.ONESIGNAL_REST_API_KEY }}" \
            SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            --project-ref kgkdiykzmqjougwzzewi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # ── Deploy ai-proxy ───────────────────────────────────────────────────
      - name: Deploy ai-proxy function
        run: |
          supabase functions deploy ai-proxy \
            --project-ref kgkdiykzmqjougwzzewi \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # ── Deploy send-notification ──────────────────────────────────────────
      # Used by: symptom check-in reminders (pg_cron), booking confirmations,
      # shop order updates, appointment reminders.
      - name: Deploy send-notification function
        run: |
          supabase functions deploy send-notification \
            --project-ref kgkdiykzmqjougwzzewi \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # ── Deploy relworx-payment ────────────────────────────────────────────
      - name: Deploy relworx-payment function
        run: |
          supabase functions deploy relworx-payment \
            --project-ref kgkdiykzmqjougwzzewi \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
