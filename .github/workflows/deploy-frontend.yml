name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main                      # GitHub default branch
      - master                    # legacy default branch
      - 'claude/**'               # active fix / feature branches
    paths:
      - 'app/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:              # allow manual re-deploy from the Actions tab

# Avoid two concurrent deploys racing each other when multiple commits land
# back-to-back. The newer commit wins; queued runs are cancelled.
concurrency:
  group: deploy-frontend-pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write             # push to gh-pages branch
      pages: write                # configure GitHub Pages source via API

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate config.js (proxy URL + Supabase public keys — no secret API keys in browser)
        run: |
          cat > app/js/config.js <<'EOF'
          // Homatt Health — runtime config
          // All AI calls go through the Supabase Edge Function proxy.
          // NO secret API keys are stored here — the proxy holds them server-side as secrets.
          // SUPABASE_ANON_KEY is a publishable key — safe to include in frontend code.
          window.HOMATT_CONFIG = {
            API_PROXY_URL:     'https://kgkdiykzmqjougwzzewi.supabase.co/functions/v1/ai-proxy',
            SUPABASE_URL:      'https://kgkdiykzmqjougwzzewi.supabase.co',
            SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtna2RpeWt6bXFqb3Vnd3p6ZXdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyMzI1MTEsImV4cCI6MjA4NjgwODUxMX0.BhrLUC57jA-xsoFiTKqk_qKVsHsb71YGSEnvjzyQ0e8',
            ONESIGNAL_APP_ID:  '${{ secrets.ONESIGNAL_APP_ID }}',
          };
          EOF
          # Strip leading whitespace added by YAML indentation
          sed -i 's/^          //' app/js/config.js

      - name: Ensure .nojekyll exists (GitHub Pages must skip Jekyll for our /portals/ tree)
        run: touch app/.nojekyll

      - name: Deploy app/ to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./app
          publish_branch: gh-pages
          force_orphan: true
          enable_jekyll: false
          commit_message: 'deploy: update GitHub Pages from ${{ github.ref_name }} (${{ github.sha }})'

      # Point the GitHub Pages source at the gh-pages branch we just pushed to.
      # This is idempotent — safe to run every deploy. Uses the pages:write permission
      # so no manual "Settings → Pages" step is needed in the GitHub UI.
      - name: Configure GitHub Pages source → gh-pages branch
        run: |
          HTTP=$(curl -s -o /tmp/pages_resp.json -w "%{http_code}" \
            -X PUT \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"source":{"branch":"gh-pages","path":"/"}}')
          echo "Pages API response: $HTTP"
          cat /tmp/pages_resp.json || true
          # 200/204 = updated, 422 = already set (both are fine)
          [[ "$HTTP" =~ ^(200|204|422)$ ]] && echo "Pages source confirmed: gh-pages" \
            || echo "WARNING: could not auto-configure Pages (HTTP $HTTP). Go to Settings → Pages → Source → gh-pages / root."
