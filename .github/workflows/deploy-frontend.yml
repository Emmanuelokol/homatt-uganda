name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
      - 'claude/**'               # Also deploy from active fix branches
    paths:
      - 'app/**'                  # Run when app files change
      - '.github/workflows/deploy-frontend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write             # Required to push to gh-pages

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate config.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://kgkdiykzmqjougwzzewi.supabase.co' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtna2RpeWt6bXFqb3Vnd3p6ZXdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyMzI1MTEsImV4cCI6MjA4NjgwODUxMX0.BhrLUC57jA-xsoFiTKqk_qKVsHsb71YGSEnvjzyQ0e8' }}
        run: |
          cat > app/js/config.js << EOF
          // Homatt Health — runtime config
          window.HOMATT_CONFIG = {
            SUPABASE_URL: '${SUPABASE_URL}',
            SUPABASE_ANON_KEY: '${SUPABASE_ANON_KEY}',
            API_PROXY_URL: '${SUPABASE_URL}/functions/v1/ai-proxy',
          };
          EOF
          sed -i 's/^          //' app/js/config.js

      - name: Deploy app/ to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./app
          publish_branch: gh-pages
          commit_message: 'deploy: update GitHub Pages from ${{ github.ref_name }}'
