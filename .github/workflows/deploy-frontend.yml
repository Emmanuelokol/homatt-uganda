name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
      - 'claude/**'
  workflow_dispatch:              # Allow manual trigger from GitHub Actions UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write             # Required to push to gh-pages

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate config.js (Supabase URL + anon key are public; proxy URL for AI)
        run: |
          {
            echo "window.HOMATT_CONFIG = {"
            echo "  SUPABASE_URL: 'https://kgkdiykzmqjougwzzewi.supabase.co',"
            echo "  SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtna2RpeWt6bXFqb3Vnd3p6ZXdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyMzI1MTEsImV4cCI6MjA4NjgwODUxMX0.BhrLUC57jA-xsoFiTKqk_qKVsHsb71YGSEnvjzyQ0e8',"
            echo "  API_PROXY_URL: 'https://kgkdiykzmqjougwzzewi.supabase.co/functions/v1/ai-proxy',"
            echo "};"
          } > app/js/config.js

      - name: Deploy app/ to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./app
          publish_branch: gh-pages
          commit_message: 'deploy: update GitHub Pages from ${{ github.ref_name }}'
