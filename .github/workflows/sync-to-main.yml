name: Sync to main

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API keys from GitHub Secrets into config.js
        run: |
          cat > app/js/config.js << 'ENDOFFILE'
          window.HOMATT_CONFIG = {
            GROQ_API_KEY: 'GROQ_PLACEHOLDER',
            DEEPSEEK_API_KEY: 'DEEPSEEK_PLACEHOLDER',
            OPENAI_API_KEY: 'OPENAI_PLACEHOLDER',
            GEMINI_API_KEY: 'GEMINI_PLACEHOLDER',
          };
          ENDOFFILE
          sed -i "s|GROQ_PLACEHOLDER|$GROQ_API_KEY|g" app/js/config.js
          sed -i "s|DEEPSEEK_PLACEHOLDER|$DEEPSEEK_API_KEY|g" app/js/config.js
          sed -i "s|OPENAI_PLACEHOLDER|$OPENAI_API_KEY|g" app/js/config.js
          sed -i "s|GEMINI_PLACEHOLDER|$GEMINI_API_KEY|g" app/js/config.js
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Push to main
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f app/js/config.js
          git commit -m "ci: inject API keys from secrets" || echo "Nothing to commit"
          git push origin HEAD:refs/heads/main --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
