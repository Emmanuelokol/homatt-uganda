  <path d="M40 152 L160 152" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"/>

  <!-- Connecting hands -->
  <circle cx="81" cy="97" r="5" fill="white"/>
</svg>
