<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#1B5E20"/>

  <!-- Standing helper figure (right side) -->
  <!-- Head -->
  <circle cx="128" cy="42" r="12" fill="white"/>
  <!-- Body torso leaning forward -->
  <path d="M128 54 L116 90 L106 90 L118 52 Z" fill="white"/>
  <!-- Right arm reaching down -->
  <path d="M116 65 Q90 80 78 95 L82 99 Q94 86 120 70 Z" fill="white"/>
  <!-- Left arm back -->
  <path d="M122 62 L140 78 L137 82 L119 67 Z" fill="white"/>
  <!-- Right leg -->
  <path d="M109 90 L104 130 L112 130 L116 90 Z" fill="white"/>
  <!-- Left leg -->
  <path d="M118 90 L124 130 L132 130 L124 90 Z" fill="white"/>

  <!-- Kneeling person being helped (left side) -->
  <!-- Head -->
  <circle cx="68" cy="88" r="11" fill="white"/>
