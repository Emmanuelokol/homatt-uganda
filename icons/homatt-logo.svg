  <path d="M68 99 L60 130 L75 130 L74 99 Z" fill="white"/>
  <!-- Right arm reaching up toward helper -->
  <path d="M72 102 Q78 95 80 95 L82 99 Q80 99 76 106 Z" fill="white"/>
