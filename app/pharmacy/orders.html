<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homatt Pharmacy — Order Queue</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="css/pharmacy.css">
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar"></aside>
  <main class="admin-main">

    <div class="admin-topbar">
      <div class="admin-topbar-title">Order Queue</div>
      <div class="admin-topbar-right">
        <div class="admin-user-chip">
          <div class="admin-user-avatar" id="pharmacyUserAvatar">P</div>
          <span id="pharmacyUserNameTop">Pharmacist</span>
        </div>
      </div>
    </div>

    <div class="admin-content">

      <!-- Status filter tabs -->
      <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">
        <button class="btn-admin primary" id="tab-all" onclick="setTab('all')">All Orders</button>
        <button class="btn-admin secondary" id="tab-incoming" onclick="setTab('incoming')">
          Incoming <span id="badge-incoming" style="background:#D32F2F;color:#fff;border-radius:10px;padding:1px 7px;font-size:11px;margin-left:4px">0</span>
        </button>
        <button class="btn-admin secondary" id="tab-confirmed" onclick="setTab('confirmed')">Confirmed</button>
        <button class="btn-admin secondary" id="tab-preparing" onclick="setTab('preparing')">Preparing</button>
        <button class="btn-admin secondary" id="tab-ready" onclick="setTab('ready')">Ready</button>
        <button class="btn-admin secondary" id="tab-in_transit" onclick="setTab('in_transit')">In Transit</button>
        <button class="btn-admin secondary" id="tab-delivered" onclick="setTab('delivered')">Delivered</button>
        <button class="btn-admin secondary" id="tab-rejected" onclick="setTab('rejected')">Rejected</button>
      </div>

      <!-- Order cards -->
      <div id="ordersList"></div>
      <div id="ordersEmpty" style="display:none;text-align:center;padding:60px;color:#9AA0A6">
        <span class="material-icons-outlined" style="font-size:48px;display:block;margin-bottom:12px">inbox</span>
        No orders in this category
      </div>

    </div>
  </main>
</div>

<!-- Order Detail Modal -->
<div class="admin-modal-overlay" id="orderModal" style="display:none">
  <div class="admin-modal" style="max-width:540px">
    <div class="admin-modal-header">
      <div class="admin-modal-title" id="orderModalTitle">Order Details</div>
      <button class="admin-modal-close" onclick="closeModal()"><span class="material-icons-outlined">close</span></button>
    </div>
    <div class="admin-modal-body" id="orderModalBody"></div>
    <div class="admin-modal-footer" id="orderModalFooter">
      <button class="btn-admin secondary" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/config.js"></script>
<script src="js/pharmacy.js"></script>
<script>
let allOrders = [];
let currentTab = 'all';
let activeOrderId = null;

document.addEventListener('DOMContentLoaded', async () => {
  buildPharmacySidebar('orders');
  const session = requirePharmacy();
  if (!session) return;
  setupPharmacyLogout();

  const supa = initPharmacySupabase();
  window._pharmSupa = supa;

  if (supa && session.pharmacyId) {
    await loadLive(supa, session.pharmacyId);
  } else {
    allOrders = [...MOCK_ORDERS];
    render();
  }
});

async function loadLive(supa, pharmacyId) {
  const { data } = await supa.from('pharmacy_orders').select('*')
    .eq('pharmacy_id', pharmacyId).order('created_at',{ascending:false});
  allOrders = data || [];
  render();
}

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('[id^="tab-"]').forEach(b => {
    b.className = b.id === 'tab-' + tab ? 'btn-admin primary' : 'btn-admin secondary';
  });
  render();
}

function render() {
  const filtered = currentTab === 'all' ? allOrders : allOrders.filter(o => o.status === currentTab);
  const incoming = allOrders.filter(o => o.status === 'incoming');
  document.getElementById('badge-incoming').textContent = incoming.length;
  document.getElementById('badge-incoming').style.display = incoming.length ? 'inline' : 'none';

  if (!filtered.length) {
    document.getElementById('ordersList').innerHTML = '';
    document.getElementById('ordersEmpty').style.display = 'block';
    return;
  }
  document.getElementById('ordersEmpty').style.display = 'none';

  document.getElementById('ordersList').innerHTML = filtered.map(o => {
    const elapsed = Math.floor((Date.now() - new Date(o.created_at)) / 60000);
    const remaining = Math.max(0, 5 - elapsed);
    const actions = getActions(o);
    return `
    <div class="order-card ${o.urgency === 'urgent' ? 'urgent' : ''}" style="cursor:pointer" onclick="openModal('${o.id}')">
      <div class="order-card-header">
        <span class="order-ref">#${(o.id||'').toUpperCase().slice(-6)}</span>
        <span class="status-badge ${o.status}">${(o.status||'').replace('_',' ')}</span>
        ${o.urgency ? `<span class="order-urgency ${o.urgency}">${o.urgency}</span>` : ''}
        ${o.status === 'incoming' ? `<span class="timer-badge">
          <span class="material-icons-outlined" style="font-size:13px">timer</span>
          ${remaining > 0 ? remaining + 'm left' : 'Overdue'}
        </span>` : ''}
      </div>
      <div class="order-meds">${o.items ? o.items.map(i => `${i.name} ×${i.qty}`).join(', ') : '—'}</div>
      <div class="order-meta">
        <span><span class="material-icons-outlined" style="font-size:13px;vertical-align:middle">person</span> ${o.patient_name||'—'}</span>
        <span><span class="material-icons-outlined" style="font-size:13px;vertical-align:middle">location_on</span> ${o.delivery_address||'—'}</span>
        <span><span class="material-icons-outlined" style="font-size:13px;vertical-align:middle">schedule</span> ${fmtDateTime(o.created_at)}</span>
        <span><span class="material-icons-outlined" style="font-size:13px;vertical-align:middle">payments</span> ${formatUGX(o.total_cost)}</span>
      </div>
      <div class="order-actions" onclick="event.stopPropagation()">${actions}</div>
    </div>`;
  }).join('');
}

function getActions(o) {
  if (o.status === 'incoming') return `
    <button class="btn-admin success sm" onclick="updateStatus('${o.id}','confirmed')">
      <span class="material-icons-outlined" style="font-size:14px">check_circle</span> Confirm
    </button>
    <button class="btn-admin danger sm" onclick="rejectPrompt('${o.id}')">
      <span class="material-icons-outlined" style="font-size:14px">cancel</span> Reject
    </button>`;
  if (o.status === 'confirmed') return `
    <button class="btn-admin primary sm" onclick="updateStatus('${o.id}','preparing')">
      <span class="material-icons-outlined" style="font-size:14px">medication</span> Start Preparing
    </button>`;
  if (o.status === 'preparing') return `
    <button class="btn-admin success sm" onclick="updateStatus('${o.id}','ready')">
      <span class="material-icons-outlined" style="font-size:14px">done_all</span> Mark Ready
    </button>`;
  if (o.status === 'ready') return `
    <button class="btn-admin warning sm" onclick="updateStatus('${o.id}','in_transit')">
      <span class="material-icons-outlined" style="font-size:14px">local_shipping</span> Dispatched
    </button>`;
  return '';
}

window.openModal = id => {
  const o = allOrders.find(x => x.id === id);
  if (!o) return;
  activeOrderId = id;
  document.getElementById('orderModalTitle').textContent = `Order #${(o.id||'').toUpperCase().slice(-6)}`;
  document.getElementById('orderModalBody').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
      ${[
        ['Patient', o.patient_name||'—'], ['Phone', o.patient_phone||'—'],
        ['Delivery Address', o.delivery_address||'—'], ['Status', `<span class="status-badge ${o.status}">${(o.status||'').replace('_',' ')}</span>`],
        ['Urgency', o.urgency||'standard'], ['Payment', o.payment_method||'—'],
        ['Medication Cost', formatUGX(o.medication_cost)], ['Delivery Cost', formatUGX(o.delivery_cost)],
        ['Total', formatUGX(o.total_cost)], ['Ordered', fmtDateTime(o.created_at)],
      ].map(([k,v]) => `
        <div>
          <div style="font-size:11px;color:#9AA0A6;font-weight:600;text-transform:uppercase;letter-spacing:.5px">${k}</div>
          <div style="font-size:13px;font-weight:500;margin-top:3px">${v}</div>
        </div>`).join('')}
    </div>
    ${o.items ? `
      <div style="background:#F8F9FA;border-radius:8px;padding:14px">
        <div style="font-size:12px;font-weight:700;color:#5F6368;text-transform:uppercase;margin-bottom:10px">Medications</div>
        ${o.items.map(i => `
          <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #E0E0E0;font-size:13px">
            <span>${i.name}</span>
            <span style="font-weight:600">×${i.qty}</span>
          </div>`).join('')}
      </div>` : ''}
    ${o.rejection_reason ? `<div style="margin-top:12px;background:#FFEBEE;border-radius:8px;padding:10px 14px;font-size:13px;color:#C62828"><strong>Rejection reason:</strong> ${o.rejection_reason}</div>` : ''}`;

  const footer = document.getElementById('orderModalFooter');
  footer.innerHTML = `<button class="btn-admin secondary" onclick="closeModal()">Close</button>
    ${getActions(o).replace(/onclick="([^"]+)"/g, 'onclick="$1;closeModal()"')}`;
  document.getElementById('orderModal').style.display = 'flex';
};

window.closeModal = () => { document.getElementById('orderModal').style.display = 'none'; activeOrderId = null; };

window.updateStatus = async (id, status) => {
  if (window._pharmSupa) {
    const { error } = await window._pharmSupa.from('pharmacy_orders')
      .update({ status, updated_at: new Date().toISOString() }).eq('id', id);
    if (error) { showToast('Failed: ' + error.message, 'error'); return; }
  }
  const o = allOrders.find(x => x.id === id);
  if (o) o.status = status;
  render();
  showToast(`Order marked as ${status.replace('_',' ')}`, 'success');
};

window.rejectPrompt = async id => {
  const reason = prompt('Rejection reason (optional):') || '';
  if (window._pharmSupa) {
    const { error } = await window._pharmSupa.from('pharmacy_orders')
      .update({ status:'rejected', rejection_reason: reason, updated_at: new Date().toISOString() }).eq('id', id);
    if (error) { showToast('Failed: ' + error.message, 'error'); return; }
  }
  const o = allOrders.find(x => x.id === id);
  if (o) { o.status = 'rejected'; o.rejection_reason = reason; }
  render();
  showToast('Order rejected', 'warning');
};
</script>
</body>
</html>
