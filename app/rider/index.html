<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homatt Health — Rider Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="css/rider.css">
</head>
<body>
<div class="admin-login-page">
  <div class="admin-login-card">
    <div class="admin-login-logo">
      <div class="admin-login-logo-mark">
        <span class="material-icons-outlined" style="font-size:28px">electric_moped</span>
      </div>
      <div class="admin-login-title">Rider Portal</div>
      <div class="admin-login-sub">Homatt Health Deliveries — Uganda</div>
    </div>

    <form id="loginForm">
      <div class="login-field">
        <label for="riderName">Your Name</label>
        <input type="text" id="riderName" placeholder="e.g. Ssali Moses" required>
      </div>
      <div class="login-field">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" placeholder="+256 7XX XXX XXX" required>
      </div>
      <div class="login-field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="login-btn" id="loginBtn">
        Sign In to Rider Portal
      </button>
    </form>

    <div class="login-divider">or</div>

    <button class="demo-btn" id="demoBtn">
      <span class="material-icons-outlined" style="font-size:16px;vertical-align:middle;margin-right:6px">play_circle</span>
      Open Demo Dashboard
    </button>
  </div>
</div>

<script>
  if (localStorage.getItem('rider_session')) window.location.href = 'dashboard.html';

  document.getElementById('loginForm').addEventListener('submit', e => {
    e.preventDefault();
    const name = document.getElementById('riderName').value.trim();
    const phone = document.getElementById('phone').value.trim();
    localStorage.setItem('rider_session', JSON.stringify({ name: name || phone, phone }));
    window.location.href = 'dashboard.html';
  });

  document.getElementById('demoBtn').addEventListener('click', () => {
    localStorage.setItem('rider_session', JSON.stringify({
      name: 'Ssali Moses',
      phone: '+256 771 234 567',
      demo: true
    }));
    window.location.href = 'dashboard.html';
  });
</script>
</body>
</html>
