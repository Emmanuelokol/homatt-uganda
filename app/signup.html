<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1B5E20">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Homatt Health - Create Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/material-icons.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; background:#0A1628; font-family:'Inter',sans-serif; }
    .phone-frame {
      max-width:390px; min-height:100vh; margin:0 auto;
      display:flex; flex-direction:column;
      background:#0A1628; position:relative; overflow-x:hidden;
    }
    .status-bar {
      display:flex; justify-content:space-between; align-items:center;
      padding:10px 20px 6px; flex-shrink:0; position:relative; z-index:2;
    }
    .status-time { font-size:14px; font-weight:700; color:rgba(255,255,255,0.9); }
    .status-icons { display:flex; gap:6px; }
    .status-icons .material-icons-outlined { font-size:16px; color:rgba(255,255,255,0.9); }

    .auth-screen {
      flex:1; display:flex; flex-direction:column;
      padding:16px 24px 40px; overflow-y:auto;
    }

    .back-btn {
      display:flex; align-items:center; gap:6px;
      color:rgba(255,255,255,0.7); font-size:14px; font-weight:500;
      background:none; border:none; cursor:pointer;
      padding:0; margin-bottom:32px;
    }
    .back-btn .material-icons-outlined { font-size:20px; }

    .auth-header { margin-bottom:32px; }
    .auth-logo {
      width:56px; height:56px; border-radius:18px;
      background:linear-gradient(135deg,#2E7D32,#66BB6A);
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 8px 24px rgba(46,125,50,0.4);
      margin-bottom:20px;
    }
    .auth-logo .material-icons-outlined { font-size:28px; color:#fff; }
    .auth-title { font-size:26px; font-weight:800; color:#fff; margin-bottom:6px; }
    .auth-subtitle { font-size:14px; color:rgba(255,255,255,0.6); line-height:1.5; }

    .auth-card {
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:20px; padding:24px;
    }

    .form-group { margin-bottom:18px; }
    .form-label {
      display:block; font-size:12px; font-weight:600;
      color:rgba(255,255,255,0.6); text-transform:uppercase;
      letter-spacing:0.5px; margin-bottom:8px;
    }
    .input-wrap { position:relative; }
    .input-wrap .material-icons-outlined {
      position:absolute; left:14px; top:50%; transform:translateY(-50%);
      font-size:18px; color:rgba(255,255,255,0.4);
    }
    .form-input {
      width:100%; padding:14px 14px 14px 44px;
      background:rgba(255,255,255,0.08);
      border:1.5px solid rgba(255,255,255,0.12);
      border-radius:12px; font-size:15px; color:#fff;
      font-family:'Inter',sans-serif; transition:border-color 0.2s;
      -webkit-appearance:none;
    }
    .form-input:focus { outline:none; border-color:#4CAF50; background:rgba(255,255,255,0.1); }
    .form-input::placeholder { color:rgba(255,255,255,0.3); }

    .password-wrap { position:relative; }
    .password-wrap .form-input { padding-right:46px; }
    .toggle-pw {
      position:absolute; right:14px; top:50%; transform:translateY(-50%);
      background:none; border:none; cursor:pointer; padding:0;
      color:rgba(255,255,255,0.4); display:flex;
    }
    .toggle-pw .material-icons-outlined { font-size:18px; }

    .btn-submit {
      width:100%; padding:16px; margin-top:8px;
      background:linear-gradient(135deg,#2E7D32,#43A047);
      color:#fff; border:none; border-radius:14px;
      font-size:16px; font-weight:700; cursor:pointer;
      font-family:'Inter',sans-serif;
      box-shadow:0 8px 24px rgba(46,125,50,0.4);
      transition:transform 0.15s, box-shadow 0.15s;
      touch-action:manipulation;
    }
    .btn-submit:active { transform:scale(0.97); box-shadow:0 4px 12px rgba(46,125,50,0.3); }
    .btn-submit:disabled { opacity:0.6; cursor:not-allowed; transform:none; }

    .auth-error {
      background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.3);
      border-radius:10px; padding:12px 14px;
      font-size:13px; color:#FCA5A5; margin-top:14px; display:none;
    }

    .signin-link {
      text-align:center; margin-top:24px;
      font-size:14px; color:rgba(255,255,255,0.5);
    }
    .signin-link a {
      color:#66BB6A; font-weight:600; text-decoration:none;
    }

    .password-hint {
      font-size:11px; color:rgba(255,255,255,0.35);
      margin-top:6px; padding-left:2px;
    }
  </style>
</head>
<body>
<div class="phone-frame">
  <div class="status-bar">
    <span class="status-time" id="statusTime">9:41</span>
    <div class="status-icons">
      <span class="material-icons-outlined">signal_cellular_alt</span>
      <span class="material-icons-outlined">wifi</span>
      <span class="material-icons-outlined">battery_full</span>
    </div>
  </div>

  <div class="auth-screen">
    <button class="back-btn" onclick="history.back()">
      <span class="material-icons-outlined">arrow_back</span>
      Back
    </button>

    <div class="auth-header">
      <div class="auth-logo">
        <span class="material-icons-outlined">health_and_safety</span>
      </div>
      <div class="auth-title">Create Account</div>
      <div class="auth-subtitle">Join Homatt Health — your personal health companion built for Uganda.</div>
    </div>

    <div class="auth-card">
      <form id="signupForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <div class="input-wrap">
            <span class="material-icons-outlined">email</span>
            <input class="form-input" type="email" id="email" placeholder="you@example.com" autocomplete="email" inputmode="email">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrap password-wrap">
            <span class="material-icons-outlined">lock</span>
            <input class="form-input" type="password" id="password" placeholder="At least 6 characters" autocomplete="new-password">
            <button type="button" class="toggle-pw" id="togglePassword">
              <span class="material-icons-outlined" id="eyeIcon">visibility</span>
            </button>
          </div>
          <p class="password-hint">Minimum 6 characters</p>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
          Create Account
        </button>

        <div class="auth-error" id="authError"></div>
      </form>
    </div>

    <p class="signin-link">
      Already have an account? <a href="signin.html">Sign in</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/signup.js"></script>
</body>
</html>
