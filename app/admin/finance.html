<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homatt Admin — Finance</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar"></aside>
  <main class="admin-main">
    <div class="admin-topbar">
      <div class="admin-topbar-title">Finance &amp; Payouts</div>
      <div class="admin-topbar-right">
        <button class="btn-admin primary" id="newPayoutBtn">
          <span class="material-icons-outlined" style="font-size:16px">add</span> New Payout
        </button>
        <div class="admin-user-chip">
          <div class="admin-user-avatar" id="adminUserAvatar">A</div>
          <span id="adminUserNameTop">Admin</span>
        </div>
      </div>
    </div>

    <div class="admin-content">
      <!-- Revenue summary -->
      <div class="stats-grid" style="margin-bottom:24px">
        <div class="stat-card">
          <div class="stat-icon green"><span class="material-icons-outlined">payments</span></div>
          <div><div class="stat-number" id="statTotalOrders">—</div><div class="stat-label">Total Orders</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon orange"><span class="material-icons-outlined">local_hospital</span></div>
          <div><div class="stat-number" id="statPendingClinicPayouts">—</div><div class="stat-label">Pending Clinic Payouts</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon blue"><span class="material-icons-outlined">local_pharmacy</span></div>
          <div><div class="stat-number" id="statPendingPharmPayouts">—</div><div class="stat-label">Pending Pharmacy Payouts</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon orange"><span class="material-icons-outlined">electric_moped</span></div>
          <div><div class="stat-number" id="statPendingRiderPayouts">—</div><div class="stat-label">Pending Rider Payouts</div></div>
        </div>
      </div>

      <!-- Payouts table -->
      <div class="admin-table-wrap">
        <div class="table-header">
          <div class="table-title">Payout Records</div>
          <div class="table-filter">
            <select id="filterType">
              <option value="">All Types</option>
              <option value="clinic">Clinics</option>
              <option value="pharmacy">Pharmacies</option>
              <option value="rider">Riders</option>
            </select>
            <select id="filterPayStatus">
              <option value="">All Statuses</option>
              <option value="pending">Pending</option>
              <option value="approved">Approved</option>
              <option value="paid">Paid</option>
            </select>
          </div>
        </div>
        <table class="admin-table">
          <thead>
            <tr><th>Recipient</th><th>Type</th><th>Amount</th><th>Period</th><th>Method</th><th>Status</th><th>Created</th><th>Actions</th></tr>
          </thead>
          <tbody id="payoutsBody">
            <tr><td colspan="8" style="text-align:center;padding:32px;color:#9AA0A6">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- New Payout Modal -->
<div class="admin-modal-overlay" id="payoutModal" style="display:none">
  <div class="admin-modal">
    <div class="admin-modal-header">
      <div class="admin-modal-title">Create Payout</div>
      <button class="admin-modal-close" onclick="closeModal()"><span class="material-icons-outlined">close</span></button>
    </div>
    <div class="admin-modal-body">
      <div class="admin-form-group">
        <label>Recipient Type *</label>
        <select id="payoutType" onchange="loadRecipients()">
          <option value="clinic">Clinic</option>
          <option value="pharmacy">Pharmacy</option>
          <option value="rider">Rider</option>
        </select>
      </div>
      <div class="admin-form-group">
        <label>Recipient *</label>
        <select id="payoutRecipient"><option>Loading...</option></select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="admin-form-group">
          <label>Amount (UGX) *</label>
          <input type="number" id="payoutAmount" placeholder="50000">
        </div>
        <div class="admin-form-group">
          <label>Payment Method</label>
          <select id="payoutMethod">
            <option value="mtn_mobile_money">MTN Mobile Money</option>
            <option value="airtel_money">Airtel Money</option>
            <option value="bank_transfer">Bank Transfer</option>
          </select>
        </div>
        <div class="admin-form-group">
          <label>Period Start</label>
          <input type="date" id="payoutPeriodStart">
        </div>
        <div class="admin-form-group">
          <label>Period End</label>
          <input type="date" id="payoutPeriodEnd">
        </div>
      </div>
      <div class="admin-form-group">
        <label>Notes</label>
        <textarea id="payoutNotes" style="min-height:70px" placeholder="e.g. Week 1 Feb 2026 payout"></textarea>
      </div>
    </div>
    <div class="admin-modal-footer">
      <button class="btn-admin secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-admin primary" id="savePayoutBtn">
        <span class="material-icons-outlined" style="font-size:16px">save</span> Create Payout
      </button>
    </div>
  </div>
</div>

<div class="admin-toast" id="adminToast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/config.js"></script>
<script src="js/admin.js"></script>
<script>
let allPayouts = [];

document.addEventListener('DOMContentLoaded', async () => {
  buildAdminSidebar('finance');
  const session = await requireAdmin();
  if (!session) return;
  setupAdminLogout();
  await loadData();
  document.getElementById('newPayoutBtn').addEventListener('click', openModal);
  document.getElementById('filterType').addEventListener('change', renderPayouts);
  document.getElementById('filterPayStatus').addEventListener('change', renderPayouts);
  document.getElementById('savePayoutBtn').addEventListener('click', savePayout);
});

const DEMO_PAYOUTS = [
  { id:'p1', recipient_type:'pharmacy', recipient_name:'Ntinda Pharmacy', amount:285000, period_start: new Date(Date.now()-864e5*14).toISOString().split('T')[0], period_end: new Date(Date.now()-864e5*7).toISOString().split('T')[0], payment_method:'mtn_mobile_money', status:'pending', created_at: new Date(Date.now()-864e5*3).toISOString() },
  { id:'p2', recipient_type:'clinic', recipient_name:'Kisugu Health Centre', amount:150000, period_start: new Date(Date.now()-864e5*14).toISOString().split('T')[0], period_end: new Date(Date.now()-864e5*7).toISOString().split('T')[0], payment_method:'bank_transfer', status:'approved', created_at: new Date(Date.now()-864e5*4).toISOString() },
  { id:'p3', recipient_type:'rider', recipient_name:'Kato Moses', amount:42000, period_start: new Date(Date.now()-864e5*7).toISOString().split('T')[0], period_end: new Date(Date.now()-864e5*0).toISOString().split('T')[0], payment_method:'airtel_money', status:'paid', created_at: new Date(Date.now()-864e5*1).toISOString() },
  { id:'p4', recipient_type:'pharmacy', recipient_name:'Wandegeya Pharmacy', amount:195000, period_start: new Date(Date.now()-864e5*7).toISOString().split('T')[0], period_end: new Date(Date.now()-864e5*0).toISOString().split('T')[0], payment_method:'mtn_mobile_money', status:'pending', created_at: new Date(Date.now()-864e5*1).toISOString() },
  { id:'p5', recipient_type:'rider', recipient_name:'Ssali David', amount:36500, period_start: new Date(Date.now()-864e5*7).toISOString().split('T')[0], period_end: new Date(Date.now()-864e5*0).toISOString().split('T')[0], payment_method:'mtn_mobile_money', status:'pending', created_at: new Date(Date.now()-864e5*1).toISOString() },
];

async function loadData() {
  const demoSession = (() => { try { return JSON.parse(localStorage.getItem('admin_session')||'null'); } catch(e){return null;} })();
  if (demoSession?.demo) {
    allPayouts = DEMO_PAYOUTS;
    document.getElementById('statTotalOrders').textContent = '38';
    const pending = DEMO_PAYOUTS.filter(p=>p.status==='pending');
    document.getElementById('statPendingClinicPayouts').textContent = pending.filter(p=>p.recipient_type==='clinic').length;
    document.getElementById('statPendingPharmPayouts').textContent = pending.filter(p=>p.recipient_type==='pharmacy').length;
    document.getElementById('statPendingRiderPayouts').textContent = pending.filter(p=>p.recipient_type==='rider').length;
    renderPayouts();
    return;
  }
  if (!supabase) { renderPayouts(); return; }
  const [ordersR, pendingR, payoutsR] = await Promise.all([
    supabase.from('pharmacy_orders').select('id',{count:'exact',head:true}),
    supabase.from('payouts').select('*').eq('status','pending'),
    supabase.from('payouts').select('*').order('created_at',{ascending:false}),
  ]);
  const pending = pendingR.data || [];
  document.getElementById('statTotalOrders').textContent = ordersR.count ?? '—';
  document.getElementById('statPendingClinicPayouts').textContent = pending.filter(p=>p.recipient_type==='clinic').length;
  document.getElementById('statPendingPharmPayouts').textContent = pending.filter(p=>p.recipient_type==='pharmacy').length;
  document.getElementById('statPendingRiderPayouts').textContent = pending.filter(p=>p.recipient_type==='rider').length;
  allPayouts = payoutsR.data || [];
  renderPayouts();
}

function renderPayouts() {
  const tf = document.getElementById('filterType').value;
  const sf = document.getElementById('filterPayStatus').value;
  const filtered = allPayouts.filter(p => (!tf || p.recipient_type===tf) && (!sf || p.status===sf));
  const tbody = document.getElementById('payoutsBody');
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:32px;color:#9AA0A6">No payouts found</td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map(p => `
    <tr>
      <td style="font-weight:600">${p.recipient_name || '—'}</td>
      <td><span style="text-transform:capitalize">${p.recipient_type}</span></td>
      <td style="font-weight:700;color:#1B5E20">${formatUGX(p.amount)}</td>
      <td style="font-size:12px;color:#9AA0A6">${p.period_start ? `${formatShortDate(p.period_start)} – ${formatShortDate(p.period_end)}` : '—'}</td>
      <td style="font-size:12px;text-transform:capitalize">${(p.payment_method||'').replace(/_/g,' ')}</td>
      <td><span class="status-badge ${p.status}">${p.status}</span></td>
      <td style="font-size:12px;color:#9AA0A6">${formatShortDate(p.created_at)}</td>
      <td style="display:flex;gap:6px">
        ${p.status === 'pending' ? `
          <button class="btn-admin primary sm" onclick="markStatus('${p.id}','approved')">Approve</button>
          <button class="btn-admin success sm" onclick="markStatus('${p.id}','paid')">Mark Paid</button>` : ''}
        ${p.status === 'approved' ? `<button class="btn-admin success sm" onclick="markStatus('${p.id}','paid')">Mark Paid</button>` : ''}
      </td>
    </tr>`).join('');
}

let recipientData = {};
async function openModal() {
  await loadRecipients();
  document.getElementById('payoutModal').style.display = 'flex';
}
function closeModal() { document.getElementById('payoutModal').style.display = 'none'; }

const DEMO_RECIPIENTS = {
  clinic:   [{id:'c1',name:'Kampala Medical Centre'},{id:'c2',name:'Ntinda Health Clinic'}],
  pharmacy: [{id:'p1',name:'Ntinda Health Pharmacy'},{id:'p2',name:'City Chemist Nakasero'}],
  rider:    [{id:'r1',full_name:'Kato Moses'},{id:'r2',full_name:'Ssali David'}],
};

async function loadRecipients() {
  const type = document.getElementById('payoutType').value;
  const sel  = document.getElementById('payoutRecipient');
  sel.innerHTML = '<option>Loading...</option>';
  let data = [];
  if (!supabase) {
    data = DEMO_RECIPIENTS[type] || [];
  } else {
    let res;
    if (type === 'clinic')   res = await supabase.from('clinics').select('id,name').eq('active',true);
    if (type === 'pharmacy') res = await supabase.from('pharmacies').select('id,name').eq('active',true);
    if (type === 'rider')    res = await supabase.from('riders').select('id,full_name').eq('active',true);
    data = (res?.data && res.data.length) ? res.data : (DEMO_RECIPIENTS[type] || []);
  }
  recipientData = Object.fromEntries(data.map(d => [d.id, d.name || d.full_name]));
  sel.innerHTML = data.map(d => `<option value="${d.id}">${d.name || d.full_name}</option>`).join('');
}

async function savePayout() {
  const type  = document.getElementById('payoutType').value;
  const recId = document.getElementById('payoutRecipient').value;
  const amount = Number(document.getElementById('payoutAmount').value);
  if (!recId || !amount) { showAdminToast('Recipient and amount required', 'error'); return; }

  const btn = document.getElementById('savePayoutBtn');
  btn.disabled = true;
  const { error } = await supabase.from('payouts').insert({
    recipient_type: type,
    recipient_id: recId,
    recipient_name: recipientData[recId] || '—',
    amount,
    period_start: document.getElementById('payoutPeriodStart').value || null,
    period_end: document.getElementById('payoutPeriodEnd').value || null,
    payment_method: document.getElementById('payoutMethod').value,
    notes: document.getElementById('payoutNotes').value.trim() || null,
  });
  btn.disabled = false;
  if (error) { showAdminToast('Error: ' + error.message, 'error'); return; }
  closeModal();
  await loadData();
  showAdminToast('Payout created!', 'success');
}

async function markStatus(id, status) {
  const update = { status };
  if (status === 'paid') update.paid_at = new Date().toISOString();
  const { error } = await supabase.from('payouts').update(update).eq('id', id);
  if (error) { showAdminToast('Failed', 'error'); return; }
  await loadData();
  showAdminToast(`Marked as ${status}`, 'success');
}
</script>
</body>
</html>
