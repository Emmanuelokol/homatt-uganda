<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homatt Health — Admin Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
  <script>
    // Portals must never be served from SW cache — unregister any active SW then reload once
    if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        Promise.all(regs.map(r => r.unregister())).then(() => location.reload());
      });
    }
  </script>
</head>
<body>
  <div class="admin-login-page">
    <div class="admin-login-card">
      <div class="admin-login-logo">
        <div class="admin-login-logo-mark">
          <span class="material-icons-outlined" style="font-size:28px">health_and_safety</span>
        </div>
        <div class="admin-login-title">Homatt Admin Portal</div>
        <div class="admin-login-sub">Health Management System — Uganda</div>
      </div>

      <div class="login-field">
        <label>Email Address</label>
        <input type="email" id="adminEmail" placeholder="admin@homatt.ug" autocomplete="email">
      </div>
      <div class="login-field">
        <label>Password</label>
        <input type="password" id="adminPassword" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="login-btn" id="loginBtn">
        <span id="loginBtnText">Sign In to Admin Portal</span>
      </button>

      <div class="login-error" id="loginError"></div>

      <div style="text-align:center;margin:14px 0 0">
        <div style="color:#9AA0A6;font-size:12px;margin-bottom:10px">— or —</div>
        <button id="demoAdminBtn" style="width:100%;padding:12px;background:#F1F8E9;border:1.5px solid #A5D6A7;border-radius:8px;color:#1B5E20;font-size:14px;font-weight:600;cursor:pointer">
          <span class="material-icons-outlined" style="font-size:16px;vertical-align:middle;margin-right:6px">play_circle</span>
          Open Demo Dashboard
        </button>
        <div style="font-size:11px;color:#9AA0A6;margin-top:10px">Only authorised Homatt Health admin accounts can access this portal.</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js"></script>
  <script>
    const cfg = window.HOMATT_CONFIG || {};
    let supabase = null;
    try {
      if (cfg.SUPABASE_URL && cfg.SUPABASE_ANON_KEY && window.supabase) {
        supabase = window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY, { auth: { storageKey: 'sb-homatt-admin-auth' } });
      }
    } catch(e) { console.warn('[Admin] Supabase init failed:', e.message); }

    // Check if already logged in as admin
    (async () => {
      // Check stored session first (works offline / without Supabase CDN)
      let stored;
      try { stored = JSON.parse(localStorage.getItem('admin_session') || 'null'); } catch(e) {}
      if (stored && typeof stored === 'object' && (stored.demo || stored.isAdmin)) {
        window.location.href = 'dashboard.html';
        return;
      }
      // Fallback: check Supabase session
      if (!supabase) return;
      try {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
          const { data: profile } = await supabase.from('profiles').select('first_name, last_name, is_admin').eq('id', session.user.id).single();
          if (profile && profile.is_admin) {
            // Restore stored session marker
            localStorage.setItem('admin_session', JSON.stringify({
              email: session.user.email,
              name: (`${profile.first_name || ''} ${profile.last_name || ''}`).trim() || 'Admin',
              isAdmin: true,
              userId: session.user.id
            }));
            window.location.href = 'dashboard.html';
          }
        }
      } catch(e) { console.warn('[Admin] session check failed:', e.message); }
    })();

    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('adminEmail').value.trim();
      const password = document.getElementById('adminPassword').value;
      const errEl = document.getElementById('loginError');
      const btn = document.getElementById('loginBtn');

      errEl.style.display = 'none';
      if (!email || !password) { errEl.textContent = 'Please enter email and password'; errEl.style.display = 'block'; return; }
      if (!supabase) { errEl.textContent = 'Service unavailable. Please try the Demo Dashboard.'; errEl.style.display = 'block'; return; }

      btn.disabled = true;
      document.getElementById('loginBtnText').textContent = 'Signing in...';

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });

      btn.disabled = false;
      document.getElementById('loginBtnText').textContent = 'Sign In to Admin Portal';

      if (error) {
        errEl.textContent = 'Invalid credentials. Please try again.';
        errEl.style.display = 'block';
        return;
      }

      // Check admin flag
      const { data: profile } = await supabase.from('profiles').select('first_name, last_name, is_admin').eq('id', data.user.id).single();
      if (!profile || !profile.is_admin) {
        await supabase.auth.signOut();
        errEl.textContent = 'Access denied. Your account is not an admin account.';
        errEl.style.display = 'block';
        return;
      }

      // Store session marker so requireAdmin() works even if Supabase CDN is slow/unavailable
      localStorage.setItem('admin_session', JSON.stringify({
        email: data.user.email,
        name: (`${profile.first_name || ''} ${profile.last_name || ''}`).trim() || 'Admin',
        isAdmin: true,
        userId: data.user.id
      }));

      window.location.href = 'dashboard.html';
    });

    // Enter key support
    document.getElementById('adminPassword').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });

    document.getElementById('demoAdminBtn').addEventListener('click', () => {
      localStorage.setItem('admin_session', JSON.stringify({
        name: 'Homatt Admin (Demo)',
        email: 'demo@homatt.ug',
        demo: true
      }));
      window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
