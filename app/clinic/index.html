<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homatt Health — Clinic Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="css/clinic.css">
</head>
<body>
<div class="admin-login-page">
  <div class="admin-login-card">
    <div class="admin-login-logo">
      <div class="admin-login-logo-mark">
        <span class="material-icons-outlined" style="font-size:28px">local_hospital</span>
      </div>
      <div class="admin-login-title">Clinic Portal</div>
      <div class="admin-login-sub">Homatt Health — Uganda</div>
    </div>

    <form id="loginForm">
      <div class="login-field">
        <label for="email">Staff Email</label>
        <input type="email" id="email" placeholder="doctor@yourclinic.ug" required>
      </div>
      <div class="login-field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="login-btn" id="loginBtn">
        Sign In to Clinic Portal
      </button>
    </form>

    <div class="login-divider">or</div>

    <button class="demo-btn" id="demoBtn">
      <span class="material-icons-outlined" style="font-size:16px;vertical-align:middle;margin-right:6px">play_circle</span>
      Open Demo Dashboard
    </button>

    <div class="login-error" id="loginError"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/config.js"></script>
<script>
  (function() {
    try {
      const s = JSON.parse(localStorage.getItem('clinic_session') || 'null');
      if (s && typeof s === 'object' && !Array.isArray(s)) {
        window.location.href = 'dashboard.html';
        return;
      }
    } catch(e) {}
    localStorage.removeItem('clinic_session');
  })();

  const cfg = window.HOMATT_CONFIG || {};
  const _supa = (cfg.SUPABASE_URL && window.supabase)
    ? window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY, {
        auth: { persistSession: false }
      }) : null;

  document.getElementById('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('loginError');
    err.style.display = 'none';

    if (!_supa) {
      localStorage.setItem('clinic_session', JSON.stringify({ email, staffName: email.split('@')[0], clinicName: 'Clinic Portal' }));
      window.location.href = 'dashboard.html';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in…';

    const { data: authData, error: authError } = await _supa.auth.signInWithPassword({ email, password });
    if (authError) {
      err.textContent = authError.message;
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In to Clinic Portal';
      return;
    }

    const { data: pu } = await _supa
      .from('portal_users')
      .select('*, clinics(name)')
      .eq('auth_user_id', authData.user.id)
      .eq('role', 'clinic_staff')
      .eq('is_active', true)
      .single();

    if (!pu) {
      await _supa.auth.signOut();
      err.textContent = 'No clinic staff account found for this email.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In to Clinic Portal';
      return;
    }

    localStorage.setItem('clinic_session', JSON.stringify({
      userId: authData.user.id,
      staffName: pu.full_name || email,
      clinicId: pu.clinic_id,
      clinicName: pu.clinics?.name || 'Clinic',
      email
    }));
    window.location.href = 'dashboard.html';
  });

  document.getElementById('demoBtn').addEventListener('click', () => {
    localStorage.setItem('clinic_session', JSON.stringify({
      staffName: 'Dr. Demo',
      clinicName: 'Kampala Medical Centre',
      clinicId: null,
      demo: true
    }));
    window.location.href = 'dashboard.html';
  });
</script>
</body>
</html>
