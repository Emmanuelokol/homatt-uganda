<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homatt Health — Clinic Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="css/clinic.css">
</head>
<body>
<div class="admin-login-page">
  <div class="admin-login-card">
    <div class="admin-login-logo">
      <div class="admin-login-logo-mark">
        <span class="material-icons-outlined" style="font-size:28px">local_hospital</span>
      </div>
      <div class="admin-login-title">Clinic Portal</div>
      <div class="admin-login-sub">Homatt Health — Uganda</div>
    </div>

    <form id="loginForm">
      <div class="login-field">
        <label for="clinicName">Clinic / Facility Name</label>
        <input type="text" id="clinicName" placeholder="e.g. Kampala Medical Centre" required>
      </div>
      <div class="login-field">
        <label for="email">Staff Email</label>
        <input type="email" id="email" placeholder="doctor@yourclinic.ug" required>
      </div>
      <div class="login-field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="login-btn" id="loginBtn">
        Sign In to Clinic Portal
      </button>
    </form>

    <div class="login-divider">or</div>

    <button class="demo-btn" id="demoBtn">
      <span class="material-icons-outlined" style="font-size:16px;vertical-align:middle;margin-right:6px">play_circle</span>
      Open Demo Dashboard
    </button>

    <div class="login-error" id="loginError"></div>
  </div>
</div>

<script>
  // If already logged in, go straight to dashboard
  if (localStorage.getItem('clinic_session')) window.location.href = 'dashboard.html';

  document.getElementById('loginForm').addEventListener('submit', e => {
    e.preventDefault();
    const name = document.getElementById('clinicName').value.trim();
    const email = document.getElementById('email').value.trim();
    localStorage.setItem('clinic_session', JSON.stringify({ name: name || email, email }));
    window.location.href = 'dashboard.html';
  });

  document.getElementById('demoBtn').addEventListener('click', () => {
    localStorage.setItem('clinic_session', JSON.stringify({
      name: 'Kampala Medical Centre',
      email: 'demo@clinic.homatt.ug',
      demo: true
    }));
    window.location.href = 'dashboard.html';
  });
</script>
</body>
</html>
