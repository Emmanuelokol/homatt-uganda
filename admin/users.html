<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homatt Admin — Users</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar"></aside>
  <main class="admin-main">
    <div class="admin-topbar">
      <div class="admin-topbar-title">User Management</div>
      <div class="admin-topbar-right">
        <div class="admin-user-chip">
          <div class="admin-user-avatar" id="adminUserAvatar">A</div>
          <span id="adminUserNameTop">Admin</span>
        </div>
      </div>
    </div>

    <div class="admin-content">
      <div class="admin-table-wrap">
        <div class="table-header">
          <div class="table-title">All Registered Users</div>
          <div class="table-filter">
            <select id="filterUserStatus">
              <option value="">All Users</option>
              <option value="active">Active</option>
              <option value="suspended">Suspended</option>
            </select>
            <input type="text" id="searchUsers" placeholder="Search name / phone..." style="width:200px">
          </div>
        </div>
        <table class="admin-table">
          <thead>
            <tr><th>Name</th><th>Phone</th><th>City</th><th>Age/Sex</th><th>Family</th><th>Status</th><th>Registered</th><th>Actions</th></tr>
          </thead>
          <tbody id="usersBody">
            <tr><td colspan="7" style="text-align:center;padding:32px;color:#9AA0A6">Loading...</td></tr>
          </tbody>
        </table>
        <div style="padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid #F0F0F0">
          <span id="pageInfo" style="font-size:13px;color:#9AA0A6">Page 1</span>
          <div style="display:flex;gap:8px">
            <button class="btn-admin secondary sm" id="prevPage">← Prev</button>
            <button class="btn-admin secondary sm" id="nextPage">Next →</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- User Detail Modal -->
<div class="admin-modal-overlay" id="userModal" style="display:none">
  <div class="admin-modal" style="max-width:520px">
    <div class="admin-modal-header">
      <div class="admin-modal-title" id="userModalTitle">User Profile</div>
      <button class="admin-modal-close" onclick="closeModal()"><span class="material-icons-outlined">close</span></button>
    </div>
    <div class="admin-modal-body" id="userModalBody"></div>
    <div class="admin-modal-footer">
      <button class="btn-admin secondary" onclick="closeModal()">Close</button>
      <button class="btn-admin warning" id="suspendUserBtn" style="display:none" onclick="toggleUserSuspension(activeUserId, true)">
        <span class="material-icons-outlined" style="font-size:16px">block</span> Suspend
      </button>
      <button class="btn-admin success" id="unsuspendUserBtn" style="display:none" onclick="toggleUserSuspension(activeUserId, false)">
        <span class="material-icons-outlined" style="font-size:16px">check_circle</span> Reactivate
      </button>
    </div>
  </div>
</div>

<div class="admin-toast" id="adminToast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/config.js"></script>
<script src="js/admin.js"></script>
<script>
let allUsers = [];
let currentPage = 1;
let activeUserId = null;
const PAGE_SIZE = 20;

document.addEventListener('DOMContentLoaded', async () => {
  buildAdminSidebar('users');
  const session = await requireAdmin();
  if (!session) return;
  setupAdminLogout();
  await loadUsers();
  document.getElementById('searchUsers').addEventListener('input', () => { currentPage = 1; renderUsers(); });
  document.getElementById('filterUserStatus').addEventListener('change', () => { currentPage = 1; renderUsers(); });
  document.getElementById('prevPage').addEventListener('click', () => { if (currentPage > 1) { currentPage--; renderUsers(); } });
  document.getElementById('nextPage').addEventListener('click', () => {
    const maxPage = Math.ceil(filtered().length / PAGE_SIZE);
    if (currentPage < maxPage) { currentPage++; renderUsers(); }
  });
});

const DEMO_USERS = [
  { id:'d1', hommat_id:'HM-001', first_name:'Ssempa', last_name:'Robert', phone_number:'0772100001', city:'Ntinda', district:'Kampala', age:32, sex:'Male', has_family:true, family_size:4, is_admin:false, created_at: new Date(Date.now()-864e5*5).toISOString() },
  { id:'d2', hommat_id:'HM-002', first_name:'Nakato', last_name:'Brenda', phone_number:'0752200002', city:'Wandegeya', district:'Kampala', age:28, sex:'Female', has_family:false, family_size:1, is_admin:false, created_at: new Date(Date.now()-864e5*10).toISOString() },
  { id:'d3', hommat_id:'HM-003', first_name:'Mubiru', last_name:'John', phone_number:'0700300003', city:'Mbarara', district:'Mbarara', age:45, sex:'Male', has_family:true, family_size:6, is_admin:false, created_at: new Date(Date.now()-864e5*15).toISOString() },
  { id:'d4', hommat_id:'HM-004', first_name:'Namutebi', last_name:'Agnes', phone_number:'0782400004', city:'Entebbe', district:'Wakiso', age:35, sex:'Female', has_family:true, family_size:3, is_admin:false, created_at: new Date(Date.now()-864e5*20).toISOString() },
  { id:'d5', hommat_id:'HM-005', first_name:'Kibuuka', last_name:'Paul', phone_number:'0704500005', city:'Jinja', district:'Jinja', age:52, sex:'Male', has_family:true, family_size:5, is_admin:false, created_at: new Date(Date.now()-864e5*25).toISOString() },
  { id:'d6', hommat_id:'HM-006', first_name:'Namukasa', last_name:'Grace', phone_number:'0756600006', city:'Gulu', district:'Gulu', age:24, sex:'Female', has_family:false, family_size:1, is_admin:false, created_at: new Date(Date.now()-864e5*30).toISOString() },
];

async function loadUsers() {
  const demoSession = (() => { try { return JSON.parse(localStorage.getItem('admin_session')||'null'); } catch(e){return null;} })();
  if (demoSession?.demo) { allUsers = DEMO_USERS; renderUsers(); return; }

  const supa = adminSupa();
  if (!supa) {
    showAdminToast('Not connected — please sign in again', 'error');
    allUsers = [];
    renderUsers();
    return;
  }

  try {
    const { data, error } = await Promise.race([
      supa.from('profiles')
        .select('id,hommat_id,first_name,last_name,phone_number,city,district,dob,age,sex,has_family,family_size,is_admin,is_suspended,created_at')
        .order('created_at', {ascending:false}),
      new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 10000))
    ]);
    if (error) {
      showAdminToast('Error loading users: ' + error.message, 'error');
      allUsers = [];
    } else {
      allUsers = data || [];
    }
  } catch(e) {
    showAdminToast(e.message === 'timeout' ? 'Loading timed out — check your connection' : 'Network error loading users', 'error');
    allUsers = [];
  }
  renderUsers();
}

function filtered() {
  const q  = document.getElementById('searchUsers').value.toLowerCase();
  const sf = document.getElementById('filterUserStatus').value;
  return allUsers.filter(u => {
    if (sf === 'active' && u.is_suspended) return false;
    if (sf === 'suspended' && !u.is_suspended) return false;
    return !q || (u.first_name||'').toLowerCase().includes(q) ||
      (u.last_name||'').toLowerCase().includes(q) ||
      (u.phone_number||'').includes(q);
  });
}

function renderUsers() {
  const f = filtered();
  const start = (currentPage - 1) * PAGE_SIZE;
  const page  = f.slice(start, start + PAGE_SIZE);
  document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${Math.max(1, Math.ceil(f.length/PAGE_SIZE))} (${f.length} users)`;
  const tbody = document.getElementById('usersBody');
  if (!page.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:32px;color:#9AA0A6">No users found</td></tr>';
    return;
  }
  tbody.innerHTML = page.map(u => `
    <tr>
      <td>
        <div style="font-weight:600">${[u.first_name,u.last_name].filter(Boolean).join(' ') || '—'}</div>
        <div style="font-size:11px;color:#9AA0A6">${u.hommat_id||''}</div>
      </td>
      <td style="font-size:12px">${u.phone_number||'—'}</td>
      <td style="font-size:12px">${[u.city,u.district].filter(Boolean).join(', ')||'—'}</td>
      <td style="font-size:12px">${u.age||'—'} / ${u.sex||'—'}</td>
      <td style="font-size:12px">${u.has_family ? `Yes (${u.family_size||0})` : 'No'}</td>
      <td>${u.is_suspended ? '<span class="status-badge suspended">Suspended</span>' : '<span class="status-badge approved">Active</span>'}</td>
      <td style="font-size:12px;color:#9AA0A6">${formatShortDate(u.created_at)}</td>
      <td>
        <button class="btn-admin secondary sm" onclick="openModal('${u.id}')">
          <span class="material-icons-outlined" style="font-size:14px">visibility</span>
        </button>
      </td>
    </tr>`).join('');
}

function openModal(id) {
  const u = allUsers.find(x => x.id === id);
  if (!u) return;
  activeUserId = id;
  const name = [u.first_name,u.last_name].filter(Boolean).join(' ') || 'Unknown User';
  document.getElementById('userModalTitle').textContent = name;
  document.getElementById('userModalBody').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      ${[
        ['Homatt ID', u.hommat_id||'—'], ['Phone', u.phone_number||'—'],
        ['City', u.city||'—'], ['District', u.district||'—'],
        ['Date of Birth', u.dob ? formatShortDate(u.dob) : '—'], ['Age', u.age||'—'],
        ['Sex', u.sex||'—'], ['Admin', u.is_admin ? 'Yes' : 'No'],
        ['Family Plan', u.has_family ? `Yes (${u.family_size||0} members)` : 'No'],
        ['Registered', formatShortDate(u.created_at)],
        ['Account Status', u.is_suspended ? '<span class="status-badge suspended">Suspended</span>' : '<span class="status-badge approved">Active</span>'],
      ].map(([k,v]) => `
        <div>
          <div style="font-size:11px;color:#9AA0A6;font-weight:600;text-transform:uppercase;letter-spacing:.5px">${k}</div>
          <div style="font-size:13px;font-weight:500;margin-top:3px">${v}</div>
        </div>`).join('')}
    </div>`;
  document.getElementById('suspendUserBtn').style.display = !u.is_suspended && !u.is_admin ? 'inline-flex' : 'none';
  document.getElementById('unsuspendUserBtn').style.display = u.is_suspended ? 'inline-flex' : 'none';
  document.getElementById('userModal').style.display = 'flex';
}
function closeModal() { document.getElementById('userModal').style.display = 'none'; activeUserId = null; }

async function toggleUserSuspension(userId, suspend) {
  if (!userId) return;
  const supa = adminSupa();
  if (!supa) { showAdminToast('Demo mode — cannot update', 'default'); return; }
  const { error } = await supa.from('profiles').update({ is_suspended: suspend, updated_at: new Date().toISOString() }).eq('id', userId);
  if (error) { showAdminToast('Failed: ' + error.message, 'error'); return; }
  closeModal();
  await loadUsers();
  showAdminToast(suspend ? 'User suspended' : 'User reactivated!', suspend ? 'default' : 'success');
}
</script>
</body>
</html>
